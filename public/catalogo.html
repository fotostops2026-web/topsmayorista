<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Catálogo Mayorista — Tops</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --orange: #e58e55; --dark: #3F3D38; --muted: #888;
      --border: #e5e5e5; --soft: #f5f4f2;
    }
    body { font-family: 'Montserrat', sans-serif; background: #fff; color: var(--dark); }

    /* HEADER */
    .topbar { background: var(--orange); color: #fff; text-align: center; padding: 9px; font-size: .72rem; font-weight: 600; letter-spacing: 1.5px; text-transform: uppercase; }
    header { background: #fff; border-bottom: 1px solid var(--border); padding: 14px 24px; display: flex; align-items: center; justify-content: space-between; gap: 12px; }
    .logo img { height: 40px; display: block; }
    .logo-fallback { font-size: 1.5rem; font-weight: 700; letter-spacing: 5px; text-transform: uppercase; color: #e02020; }
    .header-right { display: flex; align-items: center; gap: 12px; flex-shrink: 0; }
    .badge-mayorista { font-size: .68rem; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; color: var(--orange); border: 1.5px solid var(--orange); padding: 5px 12px; }
    .btn-wa { display: flex; align-items: center; gap: 7px; background: #25D366; color: #fff; border: none; font-family: 'Montserrat', sans-serif; font-size: .72rem; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase; padding: 10px 18px; cursor: pointer; text-decoration: none; white-space: nowrap; }
    .btn-wa:hover { background: #1fb855; }

    /* HERO */
    .hero { background: var(--soft); border-bottom: 1px solid var(--border); text-align: center; padding: 36px 20px; }
    .hero h1 { font-size: 1.2rem; font-weight: 700; letter-spacing: 3px; text-transform: uppercase; margin-bottom: 8px; }
    .hero p { font-size: .78rem; color: var(--muted); max-width: 420px; margin: 0 auto; line-height: 1.6; }

    /* GRID */
    .section { max-width: 1400px; margin: 0 auto; padding: 40px 20px 80px; }
    .section-title { font-size: .68rem; font-weight: 700; letter-spacing: 3px; text-transform: uppercase; color: var(--muted); margin-bottom: 24px; padding-bottom: 12px; border-bottom: 1px solid var(--border); }
    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 1px; background: var(--border); }

    /* CARD */
    .card { background: #fff; display: flex; flex-direction: column; }
    .card-img { aspect-ratio: 3/4; background: var(--soft); overflow: hidden; display: flex; align-items: center; justify-content: center; }
    .card-img img { width: 100%; height: 100%; object-fit: contain; display: block; transition: transform .4s; }
    .card:hover .card-img img { transform: scale(1.04); }
    .card-body { padding: 10px 12px 14px; display: flex; flex-direction: column; gap: 5px; }
    .card-name  { font-size: .75rem; font-weight: 700; text-transform: uppercase; letter-spacing: .8px; line-height: 1.3; }
    .card-color { font-size: .68rem; color: var(--muted); font-weight: 500; }
    .card-sku   { font-size: .64rem; color: #bbb; }
    .card-price { font-size: 1rem; font-weight: 700; color: var(--orange); }
    .card-sizes { display: flex; gap: 3px; flex-wrap: wrap; }
    .card-size  { font-size: .6rem; padding: 2px 6px; border: 1px solid var(--border); color: var(--muted); background: var(--soft); }

    /* SKELETON */
    .skeleton { background: #eee; animation: pulse 1.4s ease-in-out infinite; }
    @keyframes pulse { 0%,100% { opacity: 1 } 50% { opacity: .4 } }
    .sk-img  { aspect-ratio: 3/4; background: #eee; animation: pulse 1.4s ease-in-out infinite; }
    .sk-body { padding: 10px 12px 14px; display: flex; flex-direction: column; gap: 7px; }
    .sk-line { height: 11px; border-radius: 2px; }

    footer { background: var(--soft); border-top: 1px solid var(--border); text-align: center; padding: 28px 20px; font-size: .72rem; color: var(--muted); }

    @media (max-width: 480px) {
      .grid { grid-template-columns: repeat(2, 1fr); }
      .btn-wa span { display: none; }
      .btn-wa { padding: 10px 12px; }
    }
  </style>
</head>
<body>

<div class="topbar">Precios exclusivos para revendedores</div>
<header>
  <div class="logo">
    <img src="/logo.png" alt="Tops" onerror="this.style.display='none';this.nextElementSibling.style.display='block'">
    <span class="logo-fallback" style="display:none">tops</span>
  </div>
  <div class="header-right">
    <div class="badge-mayorista">Mayorista</div>
    <a class="btn-wa" id="btn-wa" href="#" target="_blank">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>
      <span>Consultar por WhatsApp</span>
    </a>
  </div>
</header>

<div class="hero">
  <h1>Colección Mayorista</h1>
  <p>Para hacer tu pedido escribinos por WhatsApp con el nombre del artículo y los talles.</p>
</div>

<div class="section">
  <div class="section-title" id="section-title">Cargando productos...</div>
  <div class="grid" id="grid"></div>
</div>

<footer>Tops Calzado &nbsp;·&nbsp; Catálogo exclusivo para revendedores</footer>

<script>
  const WHATSAPP = "5491133200721";

  document.getElementById("btn-wa").href =
    `https://wa.me/${WHATSAPP}?text=${encodeURIComponent("Hola! Vi el catálogo mayorista y quiero hacer un pedido.")}`;

  function fmt(n) {
    return "$" + Math.round(n).toString().replace(/\B(?=(\d{3})+(?!\d))/g, ".");
  }

  function skeletons(n) {
    return Array.from({ length: n }, () => `
      <div class="card">
        <div class="sk-img"></div>
        <div class="sk-body">
          <div class="skeleton sk-line" style="width:75%"></div>
          <div class="skeleton sk-line" style="width:45%"></div>
          <div class="skeleton sk-line" style="width:35%"></div>
        </div>
      </div>`).join("");
  }

  const grid = document.getElementById("grid");
  grid.innerHTML = skeletons(16);

  fetch("/api/products")
    .then(r => r.json())
    .then(products => {
      const withPrice = products.filter(p => p.wholesalePrice);

      if (!withPrice.length) {
        document.getElementById("section-title").textContent = "Próximamente";
        grid.innerHTML = "";
        return;
      }

      // Expandir: una card por color con su imagen correspondiente
      const cards = [];
      withPrice.forEach(p => {
        const images = p.images && p.images.length ? p.images : (p.image ? [p.image] : []);
        const colors = (p.colors || []).filter(c => c !== "Único");
        const sizes  = (p.sizes  || []).filter(s => s !== "Único");

        if (images.length <= 1 || !colors.length) {
          // Un solo card
          cards.push({ ...p, displayImage: images[0] || "", displayColor: colors[0] || "" });
        } else {
          // Una card por imagen/color
          const count = Math.max(images.length, colors.length);
          for (let i = 0; i < count; i++) {
            cards.push({
              ...p,
              displayImage: images[i] || images[0] || "",
              displayColor: colors[i] || colors[0] || "",
            });
          }
        }
      });

      document.getElementById("section-title").textContent =
        `${cards.length} artículo${cards.length !== 1 ? "s" : ""} disponible${cards.length !== 1 ? "s" : ""}`;

      grid.innerHTML = cards.map(c => {
        const sizes = (c.sizes || []).filter(s => s !== "Único").slice(0, 10);
        return `
          <div class="card">
            <div class="card-img">
              <img src="${c.displayImage}" alt="${c.name}"
                   loading="lazy"
                   onerror="this.parentElement.style.background='#eee';this.style.display='none'" />
            </div>
            <div class="card-body">
              <div class="card-name">${c.name}</div>
              ${c.displayColor ? `<div class="card-color">${c.displayColor}</div>` : ''}
              ${c.sku ? `<div class="card-sku">Art. ${c.sku}</div>` : ''}
              <div class="card-price">${fmt(c.wholesalePrice)}</div>
              ${sizes.length ? `<div class="card-sizes">${sizes.map(s => `<span class="card-size">T.${s}</span>`).join('')}</div>` : ''}
            </div>
          </div>`;
      }).join("");
    })
    .catch(() => {
      grid.innerHTML = `<div style="grid-column:1/-1;text-align:center;padding:60px;color:#c0392b;font-size:.8rem">Error al cargar. Recargá la página.</div>`;
    });
</script>
</body>
</html>
